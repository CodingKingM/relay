spring.application.name=relay-backend

# Database — credentials must be supplied via environment variables.
# For local development, copy .env.example to .env and fill in the values.
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/relay?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=false

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# CORS — comma-separated list of allowed frontend origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80}

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.org.springframework.web=WARN
logging.level.oth.ics.wtp.relaybackend=INFO
logging.level.root=WARN
